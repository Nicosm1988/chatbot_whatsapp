name: WhatsApp Bot Inactivity Check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-inactivity-check:
    runs-on: ubuntu-latest

    steps:
      - name: Validate secret
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not configured"
            exit 1
          fi

      - name: Ping production inactivity endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --silent --show-error --retry 3 --retry-all-errors \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://whatsapp-bot-node-chatbot1.vercel.app/api/cron/inactivity"
